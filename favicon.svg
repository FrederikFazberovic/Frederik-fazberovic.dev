<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:hsl(0,0%,8%)"/>
      <stop offset="100%" style="stop-color:hsl(0,0%,5%)"/>
    </linearGradient>
    <linearGradient id="letter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:hsl(0,85%,60%)"/>
      <stop offset="100%" style="stop-color:hsl(20,85%,50%)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" fill="url(#bg)" rx="4"/>

  <!-- Subtle border -->
  <rect width="32" height="32" fill="none" stroke="hsl(0,85%,55%)" stroke-width="0.75" stroke-opacity="0.3" rx="4"/>

  <!-- F letterform — clean geometric, Space Grotesk style -->
  <!-- Vertical stem -->
  <rect x="8" y="7" width="3" height="18" fill="url(#letter)" rx="0.5"/>
  <!-- Top horizontal bar -->
  <rect x="8" y="7" width="14" height="3" fill="url(#letter)" rx="0.5"/>
  <!-- Middle horizontal bar -->
  <rect x="8" y="14.5" width="10" height="2.5" fill="url(#letter)" rx="0.5"/>
</svg>
